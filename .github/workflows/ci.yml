name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  calidad:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar lint
        run: npm run lint

      - name: Compilar workspaces
        run: npm run build

      - name: Instalar navegador para Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar smoke E2E
        run: CI=1 npm run test:e2e
