services:
  backend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -w backend"
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
    env_file:
      - ../backend/.env

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -w frontend -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ..:/app
    env_file:
      - ../frontend/.env
    depends_on:
      - backend
